name: wbis_app
description: Waste Behaviour Intelligence System mobile app.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # UI
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1

  # Device Features
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  qr_code_scanner: ^1.0.0
  permission_handler: ^11.3.0
  camera: ^0.10.5+9

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  shared_preferences: ^2.2.3
  dio: ^5.4.3+1
  logger: ^2.3.0
  csv: ^8.0.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700